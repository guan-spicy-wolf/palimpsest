task: "A simple smoke test task: increase version by 0.0.1"
role: "default"

workspace:
  repo: "https://github.com/morrejssc-hub/palimpsest-test.git"
  init_branch: "main"
  depth: 1
  git_token_env: "GITHUB_TOKEN"

llm:
  model: "openai/kimi-k2.5"
  api_base: "https://coding.dashscope.aliyuncs.com/v1"
  api_key_env: "OPENAI_API_KEY"
  max_iterations: 20
  temperature: 1.0
  max_tokens: 4096
  # top_p: 1.0
  # frequency_penalty: 0.0
  # presence_penalty: 0.0
  # Retry configuration (exponential backoff)
  max_retries: 3
  retry_initial_delay: 1.0
  retry_max_delay: 60.0
  retry_backoff_factor: 2.0
  # Anthropic-specific cache control
  # anthropic_cache_system: true
  # anthropic_cache_tools: true

tools:
  builtin:
    bash:
      timeout: 60
      output_limit: 4096
  # disabled_builtins: ["spawn"]  # Uncomment to disable specific runtime builtins

publication:
  strategy: "branch"
  branch_prefix: "palimpsest/job"
  max_recovery_attempts: 1

eventstore:
  url: ""
  api_key_env: ""
  source_id: "palimpsest-agent"
